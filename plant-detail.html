       DESIGN SYSTEM (Matches index.html)

      --background: #ffffff;
      --surface: #f7f6f2;
      --primary: #1a3d2b;
      --accent: #4a7c59;
      --light-green: #e8f0e9;
      --text-primary: #0d0d0d;
      --text-secondary: #5a5a5a;
      --border: #e8e8e8;
      --white: #ffffff;
      --transition: all 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--background); color: var(--text-primary); line-height: 1.6; }
    h1, h2, h3, .playfair { font-family: 'Playfair Display', serif; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; font-family: inherit; }
    img { max-width: 100%; display: block; }

    /* Navigation */
    nav {
      position: sticky; top: 0; left: 0; width: 100%;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
      box-shadow: 0 1px 10px rgba(0,0,0,0.05); padding: 1rem 5%;
      display: flex; justify-content: space-between; align-items: center; z-index: 100;
    }
    .back-link { font-weight: 500; color: var(--text-secondary); transition: var(--transition); }
    .back-link:hover { color: var(--primary); }
    .btn-whatsapp { background: var(--primary); color: var(--white); padding: 0.6rem 1.2rem; border-radius: 40px; font-weight: 500; transition: var(--transition); }
    .btn-whatsapp:hover { background: var(--accent); }

    /* ============================================================
       DETAIL SECTION LAYOUT
       ============================================================ */
    .detail-container {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;
      padding: 4rem 5%; max-width: 1400px; margin: 0 auto;
    }
    @media (max-width: 900px) { .detail-container { grid-template-columns: 1fr; gap: 2rem; } }

    /* Left Gallery */
    .gallery { display: flex; flex-direction: column; gap: 1rem; }
    .main-image {
      width: 100%; aspect-ratio: 4/5; border-radius: 16px; overflow: hidden;
      background: var(--surface);
    }
    .main-image img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease; }
    .thumbnails { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem; }
    .thumb {
      width: 80px; height: 80px; border-radius: 8px; cursor: pointer;
      opacity: 0.6; transition: var(--transition); object-fit: cover;
      border: 2px solid transparent;
    }
    .thumb.active, .thumb:hover { opacity: 1; border-color: var(--primary); }

    /* Right Info Panel */
    .info { display: flex; flex-direction: column; gap: 1.5rem; justify-content: center; }
    .category-badge { display: inline-block; background: var(--surface); padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.9rem; font-weight: 600; width: max-content; }
    .title { font-size: clamp(2.5rem, 4vw, 3.5rem); line-height: 1.1; color: var(--primary); }
    .price { font-size: 2rem; font-weight: 600; color: var(--accent); }
    .meta { font-size: 1rem; color: var(--text-secondary); display: flex; gap: 1rem; align-items: center; }
    .stars { color: #f5c518; letter-spacing: 2px; }
    .description { font-size: 1.1rem; color: var(--text-secondary); }
    .care-tip { background: var(--light-green); padding: 1.5rem; border-radius: 12px; border-left: 4px solid var(--accent); }
    
    /* Action Buttons */
    .actions { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
    .btn-huge {
      background: var(--primary); color: var(--white); text-align: center;
      padding: 1.2rem; border-radius: 12px; font-size: 1.2rem; font-weight: 600;
      transition: var(--transition); display: block;
    }
    .btn-huge:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(26,61,43,0.2); }
    .btn-secondary {
      background: var(--white); color: var(--primary); border: 2px solid var(--primary);
      text-align: center; padding: 1rem; border-radius: 12px; font-weight: 600;
      transition: var(--transition); display: block;
    }
    .btn-secondary:hover { background: var(--surface); }
    .trust-text { font-size: 0.85rem; color: var(--text-muted); text-align: center; }

    /* ============================================================
       RELATED SECTION (Matches Index grid)
       ============================================================ */
    .related { padding: 4rem 5%; background: var(--surface); }
    .related h2 { font-size: 2.5rem; text-align: center; margin-bottom: 3rem; color: var(--primary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .card { background: var(--white); border-radius: 12px; overflow: hidden; cursor: pointer; transition: var(--transition); padding-bottom: 1.5rem; }
    .card-img-wrap { aspect-ratio: 4/5; overflow: hidden; margin-bottom: 1rem; }
    .card img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
